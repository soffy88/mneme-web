# Mneme Web — 加入 helios-net,Cloudflare Tunnel 反代
services:
  mneme-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mneme-web:latest
    container_name: mneme-web
    restart: unless-stopped
    environment:
      # 生产 API(NEXT_PUBLIC_* 构建期由 .env.production 内联=mneme-api.uex.hk,此为运行期兜底)
      NEXT_PUBLIC_API_BASE: https://mneme-api.uex.hk
      NEXT_PUBLIC_USE_MOCK: "false"
    networks:
      - helios-net
    ports:
      - "3300:3000"   # 便于主机直连自检(localhost:3300)；公网走 cloudflared

  # Cloudflare Tunnel(容器化,对齐 helios/tide/aegis 做法)：本地管理式配置,
  # ingress 走 helios-net 内名 mneme-web:3000 / mneme-api-1:8000（见 ~/.cloudflared/mneme.yml）。
  # user 1000 以读取宿主 soffy 的凭据(600)。
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mneme-cloudflared
    restart: unless-stopped
    user: "1000:1000"
    command: tunnel --no-autoupdate --config /etc/cloudflared/mneme.yml run
    volumes:
      - /home/soffy/.cloudflared:/etc/cloudflared:ro
    networks:
      - helios-net
    depends_on:
      - mneme-web

networks:
  helios-net:
    external: true
