# Mneme Web — 加入 helios-net,Cloudflare Tunnel 反代
services:
  mneme-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mneme-web:latest
    container_name: mneme-web
    restart: unless-stopped
    environment:
      # 生产 API(NEXT_PUBLIC_* 构建期由 .env.production 内联=api.sxueji.com,此为运行期兜底)
      NEXT_PUBLIC_API_BASE: https://api.sxueji.com
      NEXT_PUBLIC_USE_MOCK: "false"
    networks:
      - helios-net
    ports:
      - "3300:3000"   # 便于主机直连自检(localhost:3300)；公网走共享边缘(aegis-caddy → sxueji.com)

networks:
  helios-net:
    external: true
